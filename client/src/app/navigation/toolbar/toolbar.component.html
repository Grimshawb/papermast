<mat-toolbar color="primary" class="toolbar">

  <!-- Left -->
  <button mat-icon-button (click)="menuClick()" class="toggle-button">
    <mat-icon color="accent">menu</mat-icon>
  </button>
  <span class="app-title">{{ appTitle }}</span>
  <span class="spacer"></span>

  <!-- Right -->
  <div>
    @if (!loggedInUser) {
      <a [routerLink]="'login'" style="margin-right: 2rem; color: white;">Log In</a>
    }
    @if (loggedInUser) {
      <span style="margin-right: 2rem; color: white;">Welcome Back {{loggedInUser.firstName}}</span>
    }
  </div>

</mat-toolbar>
